<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Одбројување до летот: Даблин ✈ Фаро | Ryanair</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Постави ја сликата за позадина */
            background-image: url('faro_ryanair_bg.PNG'); /* Името на сликата во истото репозитори */
            background-size: cover; /* Сликата да го покрие целиот екран */
            background-position: center; /* Центрирај ја сликата */
            background-repeat: no-repeat; /* Не ја повторувај сликата */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Полутранспарентен слој за подобра читливост */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 30, 84, 0.6); /* Темно сина со 60% проѕирност */
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* За да биде над проѕирниот слој */
            padding: 20px;
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 1.6rem;
            color: #F1C40F; /* Жолт акцент како логото на Ryanair */
            margin-bottom: 40px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .airport-code {
            font-weight: 700;
        }

        /* Стил за часовникот */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px 35px;
            border-radius: 15px;
            min-width: 150px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .number {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            display: block;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #cbd5e1;
        }

        /* Прилагодување за помали екрани (мобилни) */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.2rem; margin-bottom: 25px; gap: 10px; }
            .time-box { padding: 15px 20px; min-width: 110px; }
            .number { font-size: 3.2rem; }
            .label { font-size: 0.9rem; }
            .countdown-wrapper { gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Вашата авантура започнува наскоро!</h1>
        <h2>
            <span class="airport">🍀 Даблин <span class="airport-code">(DUB)</span></span>
            <span class="plane">✈</span>
            <span class="airport">☀️ Фаро <span class="airport-code">(FAO)</span></span>
        </h2>
        
        <div class="countdown-wrapper">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Денови</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Часови</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Минути</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Секунди</span>
            </div>
        </div>
    </div>

    <script>
        // Точното време на летот: 17 Јули 2026 во 18:40 часот
        const flightDate = new Date("Jul 17, 2026 18:40:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = flightDate - now;

            // Пресметки за денови, часови, минути и секунди
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Функција за додавање нула на почетокот ако бројот е едноцифрен (пр. 05 наместо 5)
            const formatTime = (num) => num < 10 ? "0" + num : num;

            // Вметнување во HTML елементите
            document.getElementById("days").innerHTML = formatTime(days);
            document.getElementById("hours").innerHTML = formatTime(hours);
            document.getElementById("minutes").innerHTML = formatTime(minutes);
            document.getElementById("seconds").innerHTML = formatTime(seconds);

            // Ако времето истече
            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".container").innerHTML = `
                    <h1 style="font-size: 4rem; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.6);">Пријатен лет! ✈☀️</h1>
                    <h2 style="color: #F1C40F; text-shadow: 2px 2px 4px rgba(0,0,0,0.6);">Време е за полетување кон прекрасниот Фаро!</h2>
                `;
            }
        }, 1000);
    </script>
</body>
</html>
